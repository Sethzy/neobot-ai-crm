    <rect x="0" y="0" width="360" height="64" rx="28" fill="#111827"/>
    <circle cx="34" cy="32" r="8" fill="#FF6B5E"/>
    <circle cx="62" cy="32" r="8" fill="#F5C453"/>
    <circle cx="90" cy="32" r="8" fill="#58C970"/>
    <text x="124" y="40" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Workspace</text>

    <rect x="28" y="94" width="116" height="32" rx="16" fill="#F3F4F6"/>
    <text x="54" y="116" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Chat</text>
    <rect x="156" y="94" width="112" height="32" rx="16" fill="#EEF2FF"/>
    <text x="181" y="116" fill="#5547D9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">CRM</text>

    <rect x="28" y="154" width="304" height="70" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <circle cx="60" cy="189" r="14" fill="url(#violet)"/>
    <rect x="88" y="174" width="124" height="10" rx="5" fill="#111827"/>
    <rect x="88" y="195" width="190" height="8" rx="4" fill="#CBD5E1"/>

    <rect x="28" y="246" width="304" height="70" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="60" cy="281" r="14" fill="#111827"/>
    <rect x="88" y="266" width="162" height="10" rx="5" fill="#111827"/>
    <rect x="88" y="287" width="206" height="8" rx="4" fill="#CBD5E1"/>

    <rect x="28" y="338" width="304" height="54" rx="18" fill="#F6F7FF" stroke="#DCD7FF"/>
