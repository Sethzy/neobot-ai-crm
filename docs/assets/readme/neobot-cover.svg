<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NeoBot product banner</title>
  <desc id="desc">An AI CRM workspace showing chat, CRM records, automations, tools, approvals, and agent run state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F2FF"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#34323B"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6D5EF8"/>
      <stop offset="1" stop-color="#B469FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F6FEB"/>
      <stop offset="1" stop-color="#4FC3F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#1F2937" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#6D5EF8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="28" y="28" width="1344" height="664" rx="34" fill="url(#bg)" stroke="#292733" stroke-width="3"/>
  <rect x="68" y="76" width="1264" height="508" rx="28" fill="url(#grid)"/>

  <g transform="translate(108 104)" filter="url(#shadow)">
