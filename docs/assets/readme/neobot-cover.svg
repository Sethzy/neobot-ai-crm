  <g transform="translate(1088 142)" filter="url(#shadow)">
    <rect x="0" y="0" width="210" height="368" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <text x="34" y="48" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Tool layer</text>
    <g transform="translate(28 82)">
      <rect width="154" height="38" rx="19" fill="#F8FAFC" stroke="#E5E7EB"/>
      <circle cx="25" cy="19" r="7" fill="url(#blue)"/>
      <text x="46" y="24" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">CRM</text>
    </g>
    <g transform="translate(28 136)">
      <rect width="154" height="38" rx="19" fill="#F8FAFC" stroke="#E5E7EB"/>
      <circle cx="25" cy="19" r="7" fill="url(#violet)"/>
      <text x="46" y="24" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Files</text>
    </g>
    <g transform="translate(28 190)">
      <rect width="154" height="38" rx="19" fill="#F8FAFC" stroke="#E5E7EB"/>
      <circle cx="25" cy="19" r="7" fill="#10B981"/>
      <text x="46" y="24" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Meetings</text>
    </g>
    <g transform="translate(28 244)">
      <rect width="154" height="38" rx="19" fill="#F8FAFC" stroke="#E5E7EB"/>
      <circle cx="25" cy="19" r="7" fill="#F59E0B"/>
      <text x="46" y="24" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Triggers</text>
    </g>
    <g transform="translate(28 298)">
      <rect width="154" height="38" rx="19" fill="#F8FAFC" stroke="#E5E7EB"/>
      <circle cx="25" cy="19" r="7" fill="#111827"/>
      <text x="46" y="24" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Browser</text>
    </g>
  </g>

  <path d="M468 318C500 318 478 318 512 318" stroke="#6D5EF8" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 14"/>
  <path d="M1048 318C1074 318 1062 318 1088 318" stroke="#6D5EF8" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 14"/>

  <text x="92" y="626" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="850">AI CRM workspace for advisory sales</text>
  <text x="94" y="668" fill="#576170" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">Chat, CRM, meetings, automations, memory, approvals, and tools in one tenant-aware agent harness.</text>
</svg>
