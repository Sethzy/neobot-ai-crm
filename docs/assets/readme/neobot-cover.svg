    <text x="54" y="66" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Agent run</text>
    <rect x="54" y="98" width="132" height="10" rx="5" fill="#64748B"/>
    <rect x="54" y="132" width="152" height="42" rx="14" fill="#223047" stroke="#34425A"/>
    <text x="72" y="158" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">resolve client_id</text>
    <rect x="54" y="196" width="152" height="42" rx="14" fill="#223047" stroke="#34425A"/>
    <text x="72" y="222" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">reuse session</text>
    <rect x="54" y="260" width="152" height="42" rx="14" fill="#223047" stroke="#34425A"/>
    <text x="72" y="286" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">dispatch tools</text>
    <rect x="54" y="324" width="152" height="42" rx="14" fill="#223047" stroke="#34425A"/>
    <text x="72" y="350" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">record evals</text>

    <rect x="270" y="28" width="238" height="204" rx="22" fill="#FFFFFF"/>
    <text x="298" y="66" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">CRM objects</text>
    <rect x="298" y="98" width="160" height="12" rx="6" fill="#111827"/>
    <rect x="298" y="128" width="186" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="298" y="154" width="140" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="298" y="182" width="74" height="24" rx="12" fill="#EEF2FF"/>
    <text x="316" y="199" fill="#5547D9" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">deal</text>

    <rect x="270" y="260" width="238" height="204" rx="22" fill="#FFFFFF"/>
    <text x="298" y="298" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Approval gate</text>
    <rect x="298" y="330" width="182" height="54" rx="16" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="316" y="362" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Review before action</text>
    <rect x="298" y="406" width="84" height="30" rx="15" fill="url(#violet)"/>
    <text x="320" y="426" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850">Approve</text>
    <rect x="394" y="406" width="74" height="30" rx="15" fill="#F3F4F6"/>
    <text x="414" y="426" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850">Deny</text>
