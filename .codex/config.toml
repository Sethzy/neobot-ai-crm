[features]
multi_agent = true

[agents.reviewer]
description = "PR reviewer focused on correctness, security, behavior regressions, and missing tests."
config_file = "agents/reviewer.toml"

[[skills.config]]
path = "../.agents/skills/1-requesting-code-review"
enabled = true

[mcp_servers.sunder]
command = "npx"
args = [
    "tsx",
    "mcp-server.ts",
]

[mcp_servers.sunder.env]
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
SUNDER_USER_ID = ""
SUNDER_APP_URL = ""
SUNDER_INTERNAL_SECRET = ""
